<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #startButton {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #startButton:hover {
            background-color: #0055aa;
        }
        
        #startScreen.fade-out {
            animation: fadeOut 1s forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        #toggleLogsButton {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
        }
        
        #toggleLogsButton:hover {
            background-color: #0055aa;
        }
        
        #markerInfo,
        #logsContainer {
            position: absolute;
            top: 60px;
            left: 20px;
            color: white;
            display: none;
            z-index: 1000;
        }
        
        #logsContainer {
            top: 160px;
            max-height: 200px;
            overflow-y: auto;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <!-- Start Screen -->
    <div id="startScreen">
        <button id="startButton">Start Experience</button>
    </div>

    <!-- Toggle Logs Button -->
    <button id="toggleLogsButton" style="display: none;">Toggle Logs</button>

    <!-- Marker Info -->
    <div id="markerInfo">Marker Found: None</div>

    <!-- Logs Container -->
    <div id="logsContainer"></div>

    <a-scene embedded arjs='sourceType: webcam;' style="display: none;">
        <!-- Define 10 markers with corresponding videos -->
        <a-marker type="pattern" url="Markers/pattern-1.patt" id="marker1">
            <a-entity id="particle1" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-2.patt" id="marker2">
            <a-entity id="particle2" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-3.patt" id="marker3">
            <a-entity id="particle3" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-4.patt" id="marker4">
            <a-entity id="particle4" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-5.patt" id="marker5">
            <a-entity id="particle5" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-6.patt" id="marker6">
            <a-entity id="particle6" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-7.patt" id="marker7">
            <a-entity id="particle7" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-8.patt" id="marker8">
            <a-entity id="particle8" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-9.patt" id="marker9">
            <a-entity id="particle9" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-marker type="pattern" url="Markers/pattern-10.patt" id="marker10">
            <a-entity id="particle10" particle-system="preset: dust; particleCount: 2000;" visible="false"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script defer type="module" src="logic.js"></script>
</body>

</html>
