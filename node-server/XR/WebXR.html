<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body {
      margin: 0px;
      overflow: hidden;
    }
    #startButton, #toggleLogsButton {
      position: absolute;
      padding: 10px 20px;
      font-size: 16px;
      z-index: 1000;
    }
    #startButton {
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    #toggleLogsButton {
      top: 20px;
      right: 20px;
    }
    #markerInfo, #logsContainer {
      position: absolute;
      top: 60px;
      left: 20px;
      color: white;
      display: none;
      z-index: 1000;
    }
    #logsContainer {
      top: 100px;
      max-height: 200px;
      overflow-y: auto;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 10px;
    }
  </style>
</head>
<body>
  <!-- Start Button -->
  <button id="startButton">Start Experience</button>

  <!-- Toggle Logs Button -->
  <button id="toggleLogsButton">Toggle Logs</button>
  
  <!-- Marker Info -->
  <div id="markerInfo">Marker Found: None</div>
  
  <!-- Logs Container -->
  <div id="logsContainer"></div>

  <a-scene embedded arjs='sourceType: webcam;'>
    <!-- Define 10 markers with corresponding videos -->
    <a-marker type="pattern" url="Markers/pattern-1.patt" id="marker1"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-2.patt" id="marker2"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-3.patt" id="marker3"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-4.patt" id="marker4"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-5.patt" id="marker5"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-6.patt" id="marker6"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-7.patt" id="marker7"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-8.patt" id="marker8"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-9.patt" id="marker9"></a-marker>
    <a-marker type="pattern" url="Markers/pattern-10.patt" id="marker10"></a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const logsContainer = document.getElementById('logsContainer');
    const markerInfo = document.getElementById('markerInfo');

    document.getElementById('startButton').addEventListener('click', function() {
      // Get user media with maximum resolution and back camera
      navigator.mediaDevices.getUserMedia(
        { video: { 
            facingMode: 'environment'
            //width: { ideal: 4096 }, 
            //height: { ideal: 2160 }  
          }
        })
        .then(function(stream) {
          const videoElement = document.querySelector('video');
          if (videoElement) {
            videoElement.srcObject = stream;
          }
          logMessage('Camera started successfully.');
        })
        .catch(function(err) {
          logMessage("The following error occurred: " + err.name);
        });
    
      this.style.display = 'none'; // Hide the button after starting the experience
    });

    document.getElementById('toggleLogsButton').addEventListener('click', function() {
      logsContainer.style.display = logsContainer.style.display === 'none' ? 'block' : 'none';
    });

    logsContainer.addEventListener('click', function() {
      logsContainer.style.display = 'none';
    });

    // Get the current base URL
    const baseURL = `${window.location.protocol}//${window.location.hostname}`;
    
    // Listen for marker found event
    const markers = document.querySelectorAll('a-marker');
    markers.forEach(marker => {
      marker.addEventListener('markerFound', function() {
        const markerId = this.id;
        logMessage('Marker found: ' + markerId);
    
        // Show marker info
        markerInfo.innerText = `Marker Found: ${markerId}`;
        markerInfo.style.display = 'block';
    
        fetch(`${baseURL}/getVideoUrl?marker=${markerId}`)
          .then(response => response.json())
          .then(data => {
            const videoUrl = `${data.url}`;
            logMessage('Video URL: ' + videoUrl);
    
            let aasset = document.createElement('a-asset');
            this.appendChild(aasset);
            let video = document.createElement('video');
            aasset.appendChild(video);
            let existingVideo = document.createElement('a-video');
            
                // Stop the video playback
              video.setAttribute('id', `myVideo${markerId}${new Date().toLocaleTimeString()}`);
              video.setAttribute('src', videoUrl);
              video.setAttribute('autoplay', 'true');
              video.setAttribute('loop', 'true');
              video.play();

              existingVideo.setAttribute('src',`#${video.id}`);
              existingVideo.setAttribute('scale', '2 2 2');
              existingVideo.setAttribute('rotation', '-90 0 0');
              existingVideo.setAttribute('position', '0 1 0');
              existingVideo.setAttribute('autoplay', 'true');
              existingVideo.setAttribute('loop', 'true');
              existingVideo.setAttribute('crossorigin', 'anonymous');
    
              existingVideo.addEventListener('canplaythrough', function() {
                logMessage('Video can play through.');
              });
              existingVideo.addEventListener('error', function() {
                logMessage('Error loading video: ' + videoUrl);
              });
    
              this.appendChild(existingVideo);
          })
          .catch(error => {
            logMessage('Error fetching video URL: ' + error.message);
          });
      });
    
      // Listen for marker lost event
      marker.addEventListener('markerLost', function() {
        logMessage('marker lost');
        
        markerInfo.innerText = 'Marker Found: None';
        markerInfo.style.display = 'block';

        let aasset = this.querySelector('a-asset');
        if (aasset) { 
          let video = aasset.querySelector('video');
          // Stop the video playback
          video.pause();
          video.src = '';
          video.load();
          
          this.removeChild(aasset)
        }
          
          let existingVideo = this.querySelector('a-video');
          if (existingVideo)
          {
            this.removeChild(existingVideo);
          }
        // Hide marker info when marker is lost
        //location.reload(true);
      });
    });

    function logMessage(message) {
      const logEntry = document.createElement('div');
      logEntry.textContent = message;
      logsContainer.appendChild(logEntry);
    }
  </script>
</body>
</html>
