<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- Import AR.js version without NFT but with marker + location based support -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body {
      margin: 0px;
      overflow: hidden;
    }
    #startButton {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      font-size: 16px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <!-- Start Button -->
  <button id="startButton">Start Experience</button>

  <a-scene embedded arjs='sourceType: webcam;'>
    <!-- Define 10 markers with corresponding videos -->
    <a-marker type="pattern" url="Markers/1.patt" id="marker1">
      <a-video id="video1" src="video/1.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/2.patt" id="marker2">
      <a-video id="video2" src="video/2.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <!-- Add more markers as needed -->
    <a-marker type="pattern" url="Markers/3.patt" id="marker3">
      <a-video id="video3" src="video/3.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/4.patt" id="marker4">
      <a-video id="video4" src="video/4.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/5.patt" id="marker5">
      <a-video id="video5" src="video/5.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/6.patt" id="marker6">
      <a-video id="video6" src="video/6.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/7.patt" id="marker7">
      <a-video id="video7" src="video/7.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/8.patt" id="marker8">
      <a-video id="video8" src="video/8.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/9.patt" id="marker9">
      <a-video id="video9" src="video/9.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>
    <a-marker type="pattern" url="Markers/10.patt" id="marker10">
      <a-video id="video10" src="video/10.mp4" scale="2 2 2" rotation="90 90 0"></a-video>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    document.getElementById('startButton').addEventListener('click', function() {
      // Get user media with maximum resolution
      navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 4096 }, height: { ideal: 2160 } } })
        .then(function(stream) {
          const videoElement = document.querySelector('video');
          if (videoElement) {
            videoElement.srcObject = stream;
          }
        })
        .catch(function(err) {
          console.log("The following error occurred: " + err.name);
        });

      const videos = document.querySelectorAll('a-video');
      videos.forEach(video => {
        video.setAttribute('autoplay', 'true');
        video.setAttribute('sound', 'src: url(' + video.getAttribute('src') + '); autoplay: true');
      });
      this.style.display = 'none'; // Hide the button after starting the experience
    });
  </script>
</body>
</html>
