<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Time Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comic Neue', cursive;
            padding: 20px;
            background: url('https://archive.org/download/untitled_20240716/Untitled.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        .container {
            margin-bottom: 20px;
            text-align: center;
            z-index: 1;
            position: relative;
        }
        .text-panel {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        input, button {
            font-size: 1.5rem;
            font-family: 'Comic Neue', cursive;
        }
        button {
            display: none; /* Hide the button */
        }
        #current-time, #remaining-time, #exit-time {
            font-size: 3rem;
            margin-top: 20px;
            font-weight: bold;
            color: yellow;
            text-shadow: 2px 2px red;
        }
        .big-text {
            font-size: 4rem;
            font-weight: bold;
            color: yellow;
            text-shadow: 2px 2px red;
        }
        h1 {
            font-size: 5rem;
            color: yellow;
            text-shadow: 2px 2px red;
            margin-bottom: 20px;
        }
        label {
            font-size: 2.5rem;
            color: yellow;
            text-shadow: 1px 1px red;
        }
        .funny-gif {
            position: absolute;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1 class="text-panel">Funny Time Calculator</h1>

    <div class="container">
        <label for="main-time" class="text-panel">Main Time (HH:MM):</label>
        <input type="time" id="main-time" value="00:00" step="60" onchange="saveData()">
    </div>

    <div class="container">
        <label for="tea-break" class="text-panel">Tea Break (minutes):</label>
        <input type="number" id="tea-break" min="0" max="120" value="20" onchange="saveData()">
    </div>

    <div class="container">
        <label for="lunch-break" class="text-panel">Lunch Break (minutes):</label>
        <input type="number" id="lunch-break" min="0" max="120" value="30" onchange="saveData()">
    </div>

    <div class="container">
        <p class="text-panel">Current Time: <span id="current-time" class="big-text"></span></p>
        <p class="text-panel">Remaining Time: <span id="remaining-time" class="big-text"></span></p>
        <p class="text-panel">Exit Time: <span id="exit-time" class="big-text"></span></p>
    </div>

    <script>
        const gifs = [
            "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
            "https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif",
            "https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
            "https://media.giphy.com/media/3oEjI5VtIhHvK37WYo/giphy.gif",
            "https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif"
        ];

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomPosition() {
            const x = Math.floor(Math.random() * (window.innerWidth - 100));
            const y = Math.floor(Math.random() * (window.innerHeight - 100));
            return { x, y };
        }

        function addRandomGif() {
            const gifUrl = getRandomItem(gifs);
            const position = getRandomPosition();
            const img = document.createElement('img');
            img.src = gifUrl;
            img.className = 'funny-gif';
            img.style.left = `${position.x}px`;
            img.style.top = `${position.y}px`;
            document.body.appendChild(img);
        }

        for (let i = 0; i < 4; i++) {
            addRandomGif();
        }

        function saveData() {
            const mainTime = document.getElementById('main-time').value;
            const teaBreak = document.getElementById('tea-break').value;
            const lunchBreak = document.getElementById('lunch-break').value;

            localStorage.setItem('mainTime', mainTime);
            localStorage.setItem('teaBreak', teaBreak);
            localStorage.setItem('lunchBreak', lunchBreak);
        }

        function loadData() {
            const mainTime = localStorage.getItem('mainTime') || '00:00';
            const teaBreak = localStorage.getItem('teaBreak') || '20';
            const lunchBreak = localStorage.getItem('lunchBreak') || '30';

            document.getElementById('main-time').value = mainTime;
            document.getElementById('tea-break').value = teaBreak;
            document.getElementById('lunch-break').value = lunchBreak;
        }

        function calculateTime() {
            const mainTime = document.getElementById('main-time').value;
            const teaBreak = parseInt(document.getElementById('tea-break').value) || 0;
            const lunchBreak = parseInt(document.getElementById('lunch-break').value) || 0;

            if (!mainTime) {
                alert('Please enter a valid main time.');
                return;
            }

            const [hours, minutes] = mainTime.split(':').map(Number);
            const mainMinutes = hours * 60 + minutes;

            const totalMinutes = 8 * 60;
            const totalBreakMinutes = teaBreak + lunchBreak;
            const remainingMinutes = (totalMinutes + totalBreakMinutes) - mainMinutes;

            const remainingHours = Math.floor(remainingMinutes / 60);
            const remainingMinutesMod = remainingMinutes % 60;

            document.getElementById('current-time').innerText = new Date().toLocaleTimeString();
            document.getElementById('remaining-time').innerText = `${remainingHours} hours and ${remainingMinutesMod} minutes`;

            const currentDate = new Date();
            const exitDate = new Date(currentDate.getTime() + remainingMinutes * 60 * 1000);
            document.getElementById('exit-time').innerText = exitDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Load saved data when the page is loaded
        window.onload = function() {
            loadData(); // Load previously saved data
            calculateTime(); // Calculate time on page load
            setInterval(calculateTime, 1000); // Update every second
        };
    </script>
</body>
</html>
