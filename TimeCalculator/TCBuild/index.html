<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Time Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comic Neue', cursive;
            padding: 20px;
            background: url('https://archive.org/download/untitled_20240716/Untitled.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        .container {
            margin-bottom: 20px;
            text-align: center;
            z-index: 1;
        }
        input, button {
            font-size: 1.5rem;
            font-family: 'Comic Neue', cursive;
        }
        button {
            background-color: yellow;
            border: 2px solid white;
            padding: 10px 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.1);
        }
        #current-time, #remaining-time, #exit-time {
            font-size: 2rem;
            margin-top: 20px;
        }
        #bomb {
            display: none;
            width: 150px;
            height: 150px;
            margin: 0 auto;
        }
        .big-text {
            font-size: 3rem;
        }
        h1 {
            font-size: 4rem;
            color: yellow;
            text-shadow: 2px 2px red;
        }
        label {
            font-size: 2rem;
            color: yellow;
            text-shadow: 1px 1px red;
        }
        .funny-gif {
            position: absolute;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1>Funny Time Calculator</h1>

    <div class="container">
        <label for="main-time">Main Time (HH:MM):</label>
        <input type="time" id="main-time" value="00:00">
    </div>

    <div class="container">
        <label for="tea-break">Tea Break (minutes):</label>
        <input type="number" id="tea-break" min="0" max="120" value="20">
    </div>

    <div class="container">
        <label for="lunch-break">Lunch Break (minutes):</label>
        <input type="number" id="lunch-break" min="0" max="120" value="30">
    </div>

    <div class="container">
        <button onclick="calculateTime()">Calculate Time</button>
    </div>

    <div class="container">
        <img id="bomb" src="https://media.giphy.com/media/3ohhwHURFZoBCuC12U/giphy.gif" alt="Bomb explosion">
    </div>

    <div class="container">
        <p>Current Time: <span id="current-time" class="big-text"></span></p>
        <p>Remaining Time: <span id="remaining-time" class="big-text"></span></p>
        <p>Exit Time: <span id="exit-time" class="big-text"></span></p>
    </div>

    <script>
        const gifs = [
            "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
            "https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif",
            "https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
            "https://media.giphy.com/media/3oEjI5VtIhHvK37WYo/giphy.gif",
            "https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif"
        ];

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomPosition() {
            const x = Math.floor(Math.random() * (window.innerWidth - 100));
            const y = Math.floor(Math.random() * (window.innerHeight - 100));
            return { x, y };
        }

        function addRandomGif() {
            const gifUrl = getRandomItem(gifs);
            const position = getRandomPosition();
            const img = document.createElement('img');
            img.src = gifUrl;
            img.className = 'funny-gif';
            img.style.left = `${position.x}px`;
            img.style.top = `${position.y}px`;
            document.body.appendChild(img);
        }

        for (let i = 0; i < 4; i++) {
            addRandomGif();
        }

        function calculateTime() {
            const mainTime = document.getElementById('main-time').value;
            const teaBreak = parseInt(document.getElementById('tea-break').value) || 0;
            const lunchBreak = parseInt(document.getElementById('lunch-break').value) || 0;

            if (!mainTime) {
                alert('Please enter a valid main time.');
                return;
            }

            document.getElementById('bomb').style.display = 'block';

            setTimeout(() => {
                const [hours, minutes] = mainTime.split(':').map(Number);
                const mainMinutes = hours * 60 + minutes;

                const totalMinutes = 8 * 60;
                const totalBreakMinutes = teaBreak + lunchBreak;
                const remainingMinutes = (totalMinutes + totalBreakMinutes) - mainMinutes;

                const remainingHours = Math.floor(remainingMinutes / 60);
                const remainingMinutesMod = remainingMinutes % 60;

                document.getElementById('current-time').innerText = new Date().toLocaleTimeString();
                document.getElementById('remaining-time').innerText = `${remainingHours} hours and ${remainingMinutesMod} minutes`;

                const currentDate = new Date();
                const exitDate = new Date(currentDate.getTime() + remainingMinutes * 60 * 1000);
                document.getElementById('exit-time').innerText = exitDate.toLocaleTimeString();

                document.getElementById('bomb').style.display = 'none';
            }, 3000); // Adjust time to match the length of your animation
        }

        // Set current time initially
        document.getElementById('current-time').innerText = new Date().toLocaleTimeString();
    </script>
</body>
</html>
